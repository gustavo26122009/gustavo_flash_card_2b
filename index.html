<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcards vendadeiro ou falso</title>
    <style>
        /* Configurações Globais */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #182b46;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            gap: 20px;
            flex-wrap: wrap;
        }

        /* Container do Flashcard */
        .flashcard {
            background-color: transparent;
            width: 300px;
            height: 200px;
            perspective: 1000px; /* Cria o efeito 3D */
            cursor: pointer;
        }

        /* Elemento interno que vai girar */
        .flashcard-inner {
            position: relative;
            width: 100%;
            height: 100%;
            text-align: center;
            transition: transform 0.6s;
            transform-style: preserve-3d;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            border-radius: 10px;
        }

        /* Efeito de giro ao passar o mouse */
        .flashcard:hover .flashcard-inner {
            transform: rotateY(180deg);
        }

        /* Estilo comum para a Frente e o Verso */
        .flashcard-front, .flashcard-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden; /* Esconde o lado oposto */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: 10px;
            padding: 20px;
            box-sizing: border-box;
        }

        /* Estilo da Frente */
        .flashcard-front {
            background-color: #ffffff;
            color: #333333;
            border: 2px solid #007bff;
        }

        .flashcard-front span {
            font-size: 12px;
            color: #007bff;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .flashcard-front h2 {
            margin: 0;
            font-size: 24px;
        }

        /* Estilo do Verso */
        .flashcard-back {
            background-color: #007bff;
            color: white;
            transform: rotateY(180deg); /* Começa virado */
        }

        .flashcard-back p {
            font-size: 18px;
            line-height: 1.5;
            margin: 0;
        }
    </style>
</head>
<body>

    <!-- Flashcard 1 -->
    <div class="flashcard">
        <div class="flashcard-inner">
            <div class="flashcard-front">
                <span>Pergunta</span>
                <h2>O Rio Amazonas é o mais longo do mundo.</h2>
            </div>
            <div class="flashcard-back">
                <p>verdadeiro</p>
            </div>
        </div>
    </div>

    <!-- Flashcard 2 -->Napoleão Bonaparte era excepcionalmente baixo para a média de sua época
    <div class="flashcard">
        <div class="flashcard-inner">
            <div class="flashcard-front">
                <span>Pergunta</span>
                <h2>.</h2>
            </div>
            <div class="flashcard-back">
                <p>falso</p>
            </div>
        </div>
    </div>

</body>
</html>
